<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxbase Real-Time Chat Tester</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-glass: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
        }

        .sidebar {
            width: 320px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 20px;
            background: var(--surface-glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.connected {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 8px currentColor;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-sender {
            font-size: 11px;
            color: var(--text-muted);
            margin: 0 4px;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .message.received .message-bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message.sent .message-bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .input-area {
            padding: 20px;
            background: var(--surface-glass);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .logs {
            flex: 1;
            background: var(--bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            color: #10b981;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="font-size: 18px; margin-bottom: 10px;">Connection Config</h2>
        
        <div class="form-group">
            <label>Fluxbase Backend URL</label>
            <input type="text" id="config-url" value="https://fluxbase-realtime.onrender.com" placeholder="e.g. http://localhost:3000">
        </div>
        
        <div class="form-group">
            <label>Project ID</label>
            <input type="text" id="config-project" value="1a71220fe7be43a3" placeholder="Project ID">
        </div>
        
        <div class="form-group">
            <label>API Key</label>
            <input type="password" id="config-apikey" value="" placeholder="fl_...">
        </div>

        <div class="form-group">
            <label>Test Table Name</label>
            <input type="text" id="config-table" value="anonymous_messages">
        </div>

        <button id="btn-connect" onclick="connect()">Connect Engine</button>

        <h3 style="font-size: 12px; margin-top: 10px; color: var(--text-muted); text-transform: uppercase;">Raw Event Logs</h3>
        <div class="logs" id="logs">Waiting for connection...</div>
        <button onclick="document.getElementById('logs').innerHTML = ''" style="padding: 8px; font-size: 11px; background: transparent; border: 1px solid var(--border); color: var(--text);">Clear Logs</button>
    </div>

    <div class="chat-container">
        <div class="header">
            <div>
                <h1 style="font-size: 18px;">Native SSE App Demo</h1>
                <p style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">Zero Webhooks. 100% Realtime Database Subscriptions.</p>
            </div>
            <div class="status-badge" id="status-indicator">
                <div class="status-dot"></div>
                <span id="status-text">Disconnected</span>
            </div>
        </div>

        <div class="messages" id="messages">
            <!-- Messages will appear here -->
            <div style="margin: auto; color: var(--border); font-size: 14px; text-align: center;">
                Click "Connect Engine" to establish EventSource.<br>Then type a message below.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Type a test message..." autocomplete="off" disabled onkeypress="if(event.key === 'Enter') sendMessage()">
            <button id="btn-send" onclick="sendMessage()" disabled>Send</button>
        </div>
    </div>

    <script>
        let sse = null;
        let myMockUserId = "user-" + Math.floor(Math.random() * 10000); 
        const myMockName = "Tester " + Math.floor(Math.random() * 100);
        
        const logsEl = document.getElementById('logs');
        const messagesEl = document.getElementById('messages');
        const statusInd = document.getElementById('status-indicator');
        const statusText = document.getElementById('status-text');
        const chatInput = document.getElementById('chat-input');
        const btnSend = document.getElementById('btn-send');

        function logEvent(type, data) {
            const time = new Date().toLocaleTimeString();
            logsEl.innerHTML += `\n[${time}] ${type}\n${typeof data === 'object' ? JSON.stringify(data, null, 2) : data}\n`;
            logsEl.scrollTop = logsEl.scrollHeight;
        }

        async function connect() {
            const baseUrl = document.getElementById('config-url').value.replace(/\/$/, '');
            const projectId = document.getElementById('config-project').value;
            const apiKey = document.getElementById('config-apikey').value;

            if (!projectId || !apiKey) {
                alert("Project ID and API Key are required!");
                return;
            }

            if (sse) sse.close();

            const streamUrl = `${baseUrl}/api/realtime/subscribe?projectId=${projectId}&apiKey=${apiKey}`;
            logEvent("CONNECTING", `Establishing Native SSE to ${baseUrl}...`);
            statusText.innerText = "Connecting...";
            
            sse = new EventSource(streamUrl);

            sse.onopen = () => {
                statusInd.classList.add('connected');
                statusText.innerText = "Connected Live";
                chatInput.disabled = false;
                btnSend.disabled = false;
                messagesEl.innerHTML = ''; // clear placeholder
                logEvent("SSE_OPEN", "Connection established with Render.");
                
                // Fetch historical messages instantly to populate screen
                fetchHistory();
            };

            sse.onerror = (err) => {
                statusInd.classList.remove('connected');
                statusText.innerText = "Disconnected";
                chatInput.disabled = true;
                btnSend.disabled = true;
                logEvent("SSE_ERROR", "Connection dropped or failed to start. Wait for reconnect or check Render logs.");
                console.error("EventSource Error:", err);
            };

            sse.onmessage = (event) => {
                try {
                    const payload = JSON.parse(event.data);
                    
                    // Filter out heartbeat/connection packets if any
                    if (payload.type === 'connected') return;

                    logEvent("NEW_MUTATION", payload);

                    if (payload.event_type === 'raw_sql_mutation' && payload.operation === 'INSERT') {
                        if (payload.table_id === document.getElementById('config-table').value || 
                            payload.table_name === document.getElementById('config-table').value) {
                            
                            const newRow = payload.data?.new || payload.data || {};
                            renderMessage(newRow);
                        }
                    } else if (payload.event_type === 'row.inserted') {
                        // Extract correctly from Webhook payload nesting
                        const newRow = payload.data?.new || payload.data || payload.record || payload.new || {};
                        renderMessage(newRow);
                    }
                } catch (e) {
                    logEvent("PARSE_ERROR", "Failed to parse SSE payload.");
                }
            };
        }

        async function fetchHistory() {
            const baseUrl = document.getElementById('config-url').value.replace(/\/$/, '');
            const projectId = document.getElementById('config-project').value;
            const apiKey = document.getElementById('config-apikey').value;
            const table = document.getElementById('config-table').value;

            try {
                // Determine timestamp column (usually created_at, but their schema uses timestamp)
                const res = await fetch(`${baseUrl}/api/execute-sql`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        projectId,
                        query: `SELECT * FROM ${table} ORDER BY timestamp ASC LIMIT 50`
                    })
                });
                
                const json = await res.json();
                if (json.success && json.data) {
                    messagesEl.innerHTML = '';
                    json.data.forEach(row => renderMessage(row, true));
                }
            } catch (err) {
                logEvent("FETCH_ERROR", "Failed to fetch history.");
            }
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            
            chatInput.value = '';
            
            const baseUrl = document.getElementById('config-url').value.replace(/\/$/, '');
            const projectId = document.getElementById('config-project').value;
            const apiKey = document.getElementById('config-apikey').value;
            const table = document.getElementById('config-table').value;
            
            const tempSender = myMockName;
            
            logEvent("SENDING_SQL", `Executing INSERT on ${table}...`);
            
            // Build the exact raw SQL INSERT that your Real Chat application uses!
            const query = `
                INSERT INTO ${table} 
                (text, sender_name, sender_color, sender_id, room_code) 
                VALUES ('${text.replace(/'/g, "''")}', '${tempSender}', '#6366f1', '${myMockUserId}', 'F8BYV1')
            `;

            try {
                const res = await fetch(`${baseUrl}/api/execute-sql`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({ projectId, query })
                });

                const data = await res.json();
                if(!data.success) {
                    logEvent("MUTATION_FAILED", data);
                } else {
                    logEvent("MUTATION_SUCCESS", "Row saved. Waiting for Database to broadcast SSE Event...");
                }
            } catch(e) {
                logEvent("NETWORK_ERROR", e.message);
            }
        }

        function renderMessage(row, skipScroll = false) {
            // Drop empty structural notifications (like raw_sql_mutations with no data payload)
            if (!row || Object.keys(row).length === 0) return;

            // Check if message is already rendered by comparing unique texts (or IDs)
            // For a robust app, use row.id. Since schema is unknown strictly, we'll just append for now.
            const text = row.text || row.content;
            if (!text) return; // Completely ignore empty messages

            const sender = row.sender_name || row.sender || "System";
            const isMe = row.sender_id === myMockUserId;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMe ? 'sent' : 'received'}`;
            msgDiv.innerHTML = `
                <div class="message-sender">${sender}</div>
                <div class="message-bubble">${text}</div>
            `;
            
            messagesEl.appendChild(msgDiv);
            if(!skipScroll) {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }
        }
    </script>
</body>
</html>
