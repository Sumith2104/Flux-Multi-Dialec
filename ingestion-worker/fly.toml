app = "fluxbase-ingestion-worker"   # change to your unique app name
primary_region = "bom"              # Mumbai — closest to India
kill_signal = "SIGTERM"
kill_timeout = "30s"                # give workers time to drain

[build]
  dockerfile = "Dockerfile"

[env]
  NUM_WORKERS   = "3"
  HEALTH_PORT   = "8080"
  SCALER_MODE   = "process"         # "process" = in-app scaling, "flyio" = VM scaling

[[services]]
  protocol         = "tcp"
  internal_port    = 8080
  auto_stop_machines  = false       # keep alive always — workers must not stop
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port     = 80
    handlers = ["http"]

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.http_checks]]
    path             = "/health"
    interval         = "15s"
    timeout          = "5s"
    grace_period     = "20s"
    method           = "GET"

[[vm]]
  size   = "shared-cpu-1x"          # free tier (256MB RAM)
  memory = "256mb"
